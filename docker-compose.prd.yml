# E-Cards — production stack
#
# Prerequisites:
#   1. Copy .env.prd.example to .env.prd and fill secrets (never commit .env.prd).
#   2. Register OAuth redirect URI with your IdP, e.g. https://ecards.aiepic.app/oauth/complete
#   3. Point DNS ecards.aiepic.app to this host; terminate TLS at LB or extend nginx with certs.
#
# Usage:
#   docker compose --env-file .env.prd -f docker-compose.prd.yml up -d
#   ./bin/start.sh prd up   # if .env.prd exists and start.sh is configured
#
# Public entry: nginx on ports NGINX_HTTP_PORT / NGINX_HTTPS_PORT (default 80/443).

services:
  postgres:
    image: postgres:16-alpine
    container_name: tools_dashboard${TD_STACK_SUFFIX:-_prd_tcrd}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecards_db}
      POSTGRES_USER: ${POSTGRES_USER:-ecards_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_prd_data:/var/lib/postgresql/data
      - ./db/init-postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - ecards-prd
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecards_user} -d ${POSTGRES_DB:-ecards_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: ${POSTGRES_MEM_LIMIT:-1g}
    logging: &default-logging
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  cassandra:
    image: cassandra:5.0
    container_name: tools_dashboard${TD_STACK_SUFFIX:-_prd_tcrd}-cassandra
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: ${CASSANDRA_CLUSTER_NAME:-ecards_cluster}
      CASSANDRA_DC: ${CASSANDRA_DC:-dc1}
      CASSANDRA_RACK: ${CASSANDRA_RACK:-rack1}
      CASSANDRA_ENDPOINT_SNITCH: ${CASSANDRA_ENDPOINT_SNITCH:-GossipingPropertyFileSnitch}
      CASSANDRA_NUM_TOKENS: ${CASSANDRA_NUM_TOKENS:-256}
      MAX_HEAP_SIZE: ${CASSANDRA_MAX_HEAP_SIZE:-2G}
      JVM_OPTS: ${CASSANDRA_JVM_OPTS:--XX:MaxDirectMemorySize=1G}
    volumes:
      - cassandra_prd_data:/var/lib/cassandra
      - ./db/init-cassandra:/docker-entrypoint-initdb.d:ro
    networks:
      - ecards-prd
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    mem_limit: ${CASSANDRA_MEM_LIMIT:-4g}
    memswap_limit: ${CASSANDRA_MEM_LIMIT:-4g}
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: tools_dashboard${TD_STACK_SUFFIX:-_prd_tcrd}-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"; else exec redis-server --appendonly yes; fi'
    volumes:
      - redis_prd_data:/data
    networks:
      - ecards-prd
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: ${REDIS_MEM_LIMIT:-512m}
    logging: *default-logging

  db-init:
    image: cassandra:5.0
    container_name: tools_dashboard${TD_STACK_SUFFIX:-_prd_tcrd}-db-init
    networks:
      - ecards-prd
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./db/init-cassandra:/scripts:ro
    command: >
      bash -c '
      echo "Initializing Cassandra (prd)...";
      for script in /scripts/*.cql; do
        if [ -f "$$script" ]; then
          echo "Running $$script...";
          cqlsh cassandra -f "$$script" || { echo "Failed $$script"; exit 1; };
        fi;
      done;
      echo "Cassandra init complete.";
      '
    restart: "no"
    mem_limit: 256m
    logging: *default-logging

  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile.prd
    image: ${ECARDS_API_IMAGE:-ecards-api:prd}
    container_name: tools_dashboard${TD_STACK_SUFFIX:-_prd_tcrd}-api
    restart: unless-stopped
    command: ["sh", "-c", "npx prisma migrate deploy && exec node dist/server.js"]
    environment:
      NODE_ENV: production
      PORT: ${API_INTERNAL_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-ecards_db}
      POSTGRES_USER: ${POSTGRES_USER:-ecards_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      CASSANDRA_HOSTS: ${CASSANDRA_HOSTS:-cassandra}
      CASSANDRA_PORT: ${CASSANDRA_PORT:-9042}
      CASSANDRA_KEYSPACE: ${CASSANDRA_KEYSPACE:-ecards_canonical}
      CASSANDRA_DC: ${CASSANDRA_DC:-dc1}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://ecards.aiepic.app}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-200}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_PRIMARY_PROVIDER: ${LLM_PRIMARY_PROVIDER:-openai}
      LLM_FALLBACK_PROVIDER: ${LLM_FALLBACK_PROVIDER:-deepseek}
      LLM_CREDIT_COST: ${LLM_CREDIT_COST:-1}
      LLM_RETRY_ATTEMPTS: ${LLM_RETRY_ATTEMPTS:-2}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-10000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      USE_LOCAL_STORAGE: ${USE_LOCAL_STORAGE:-false}
      SEAWEEDFS_ENDPOINT: ${SEAWEEDFS_ENDPOINT:-}
      SEAWEEDFS_ACCESS_KEY: ${SEAWEEDFS_ACCESS_KEY:-}
      SEAWEEDFS_SECRET_KEY: ${SEAWEEDFS_SECRET_KEY:-}
      SEAWEEDFS_BUCKET: ${SEAWEEDFS_BUCKET:-}
      SEAWEEDFS_REGION: ${SEAWEEDFS_REGION:-us-east-1}
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS:-}
      TOOLS_DASHBOARD_ORIGIN: ${TOOLS_DASHBOARD_ORIGIN:-}
      APP_LIBRARY_STORAGE_INTEGRATION_KEY: ${APP_LIBRARY_STORAGE_INTEGRATION_KEY:-}
      STORAGE_USE_DASHBOARD_PUBLIC_BASE: ${STORAGE_USE_DASHBOARD_PUBLIC_BASE:-false}
      STORAGE_PUBLIC_BUCKETS: ${STORAGE_PUBLIC_BUCKETS:-}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://ecards.aiepic.app}
      EXTERNAL_AUTH_URL: ${EXTERNAL_AUTH_URL:-https://aiepic.app/app}
      EXTERNAL_SUBSCRIPTION_WS: ${EXTERNAL_SUBSCRIPTION_WS:-wss://aiepic.app/admin/ws}
      EXTERNAL_USER_API: ${EXTERNAL_USER_API:-https://aiepic.app/admin/api}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:?OAUTH_CLIENT_ID is required}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:?OAUTH_CLIENT_SECRET is required}
      OAUTH_AUTHORIZATION_ENDPOINT: ${OAUTH_AUTHORIZATION_ENDPOINT:-https://aiepic.app/oauth/authorize}
      OAUTH_TOKEN_ENDPOINT: ${OAUTH_TOKEN_ENDPOINT:-https://aiepic.app/oauth/token}
      OAUTH_USER_INFO_ENDPOINT: ${OAUTH_USER_INFO_ENDPOINT:-https://aiepic.app/api/users/me}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-https://ecards.aiepic.app/oauth/complete}
      OAUTH_SCOPES: ${OAUTH_SCOPES:-profile email subscription}
      APPLICATION_ID: ${APPLICATION_ID:?APPLICATION_ID is required}
      EXTERNAL_API_KEY: ${EXTERNAL_API_KEY:?EXTERNAL_API_KEY is required}
      USER_SUBSCRIPTION_URL: ${USER_SUBSCRIPTION_URL:-}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?TOKEN_ENCRYPTION_KEY is required}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-ecards_auth}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-ecards_refresh}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SESSION_COOKIE_HTTP_ONLY: ${SESSION_COOKIE_HTTP_ONLY:-true}
      SESSION_COOKIE_SAME_SITE: ${SESSION_COOKIE_SAME_SITE:-lax}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEBUG: ${DEBUG:-}
    networks:
      - ecards-prd
    depends_on:
      postgres:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    mem_limit: ${API_MEM_LIMIT:-1g}
    ports:
      - "127.0.0.1:${API_HOST_PORT:-7400}:4000"
    logging: *default-logging

  render-worker:
    build:
      context: ./render-worker
      dockerfile: Dockerfile.prd
    image: ${ECARDS_WORKER_IMAGE:-ecards-render-worker:prd}
    container_name: tools_dashboard${TD_STACK_SUFFIX:-_prd_tcrd}-render-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-ecards_db}
      POSTGRES_USER: ${POSTGRES_USER:-ecards_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      CASSANDRA_HOSTS: ${CASSANDRA_HOSTS:-cassandra}
      CASSANDRA_PORT: ${CASSANDRA_PORT:-9042}
      CASSANDRA_KEYSPACE: ${CASSANDRA_KEYSPACE:-ecards_canonical}
      CASSANDRA_DC: ${CASSANDRA_DC:-dc1}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      USE_LOCAL_STORAGE: ${USE_LOCAL_STORAGE:-false}
      SEAWEEDFS_ENDPOINT: ${SEAWEEDFS_ENDPOINT:-}
      SEAWEEDFS_ACCESS_KEY: ${SEAWEEDFS_ACCESS_KEY:-}
      SEAWEEDFS_SECRET_KEY: ${SEAWEEDFS_SECRET_KEY:-}
      SEAWEEDFS_BUCKET: ${SEAWEEDFS_BUCKET:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      WORKER_MAX_ATTEMPTS: ${WORKER_MAX_ATTEMPTS:-3}
      WORKER_TIMEOUT: ${WORKER_TIMEOUT:-60000}
      RENDER_ENGINE: ${RENDER_ENGINE:-canvas}
    networks:
      - ecards-prd
    depends_on:
      postgres:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    mem_limit: ${WORKER_MEM_LIMIT:-768m}
    logging: *default-logging

  front-cards:
    build:
      context: ./front-cards
      dockerfile: Dockerfile.prd
    image: ${ECARDS_FRONT_IMAGE:-ecards-front:prd}
    container_name: tools_dashboard${TD_STACK_SUFFIX:-_prd_tcrd}-frontend
    restart: unless-stopped
    env_file:
      - .env.prd
    environment:
      # Next reads `PORT`; root env may set `PORT` for the API — keep the app on the internal FRONTEND_PORT.
      PORT: ${FRONTEND_PORT:-3000}
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://ecards.aiepic.app}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://ecards.aiepic.app}
      NEXT_PUBLIC_OAUTH_CLIENT_ID: ${NEXT_PUBLIC_OAUTH_CLIENT_ID:?NEXT_PUBLIC_OAUTH_CLIENT_ID is required}
      NEXT_PUBLIC_OAUTH_AUTHORIZATION_ENDPOINT: ${NEXT_PUBLIC_OAUTH_AUTHORIZATION_ENDPOINT:-https://aiepic.app/oauth/authorize}
      NEXT_PUBLIC_OAUTH_TOKEN_ENDPOINT: ${NEXT_PUBLIC_OAUTH_TOKEN_ENDPOINT:-https://aiepic.app/oauth/token}
      NEXT_PUBLIC_OAUTH_USER_INFO_ENDPOINT: ${NEXT_PUBLIC_OAUTH_USER_INFO_ENDPOINT:-https://aiepic.app/api/users/me}
      NEXT_PUBLIC_EXTERNAL_AUTH_URL: ${NEXT_PUBLIC_EXTERNAL_AUTH_URL:-https://aiepic.app/app}
      NEXT_PUBLIC_USER_SUBSCRIPTION_URL: ${NEXT_PUBLIC_USER_SUBSCRIPTION_URL:-}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:?OAUTH_CLIENT_ID is required}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:?OAUTH_CLIENT_SECRET is required}
      OAUTH_AUTHORIZATION_ENDPOINT: ${OAUTH_AUTHORIZATION_ENDPOINT:-https://aiepic.app/oauth/authorize}
      OAUTH_TOKEN_ENDPOINT: ${OAUTH_TOKEN_ENDPOINT:-https://aiepic.app/oauth/token}
      OAUTH_USER_INFO_ENDPOINT: ${OAUTH_USER_INFO_ENDPOINT:-https://aiepic.app/api/users/me}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-https://ecards.aiepic.app/oauth/complete}
      OAUTH_SCOPES: ${OAUTH_SCOPES:-profile email subscription}
      NEXT_PUBLIC_POST_LOGIN_REDIRECT_URL: ${NEXT_PUBLIC_POST_LOGIN_REDIRECT_URL:-/dashboard}
      POST_LOGIN_REDIRECT_URL: ${POST_LOGIN_REDIRECT_URL:-/dashboard}
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS:-}
    networks:
      - ecards-prd
    depends_on:
      api-server:
        condition: service_healthy
    mem_limit: ${FRONT_MEM_LIMIT:-768m}
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    container_name: tools_dashboard${TD_STACK_SUFFIX:-_prd_tcrd}-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ./deploy/nginx/ecards.prd.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      front-cards:
        condition: service_healthy
      api-server:
        condition: service_healthy
    networks:
      - ecards-prd
    mem_limit: 256m
    logging: *default-logging

networks:
  ecards-prd:
    driver: bridge

volumes:
  postgres_prd_data:
  cassandra_prd_data:
  redis_prd_data:
