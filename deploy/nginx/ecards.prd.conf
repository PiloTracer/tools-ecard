# Reverse proxy for E-Cards production (single public hostname).
# TLS: terminate at your load balancer, or mount certs and add a second server{} on 443.
#
# Routing rule: Next.js owns /, /_next, /oauth, /auth, and /api/auth/* (BFF cookies).
# Fastify API owns /health and all other /api/* paths.

upstream ecards_next {
    server front-cards:3000;
    keepalive 32;
}

upstream ecards_api {
    server api-server:4000;
    keepalive 32;
}

server {
    listen 80;
    server_name ecards.aiepic.app;

    client_max_body_size 100M;

    # Fastify health (load balancers / compose healthchecks)
    location = /health {
        proxy_pass http://ecards_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js auth route handlers (must not hit Fastify)
    location ^~ /api/auth/ {
        proxy_pass http://ecards_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # E-Cards API (Fastify)
    location ^~ /api/ {
        proxy_pass http://ecards_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Next.js application
    location / {
        proxy_pass http://ecards_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
