services:
  # PostgreSQL - Normalized relational database
  postgres:
    image: postgres:16-alpine
    container_name: ecards-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecards_db}
      POSTGRES_USER: ${POSTGRES_USER:-ecards_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecards_dev_password}
    ports:
      - "0.0.0.0:${POSTGRES_HOST_PORT:-7432}:${POSTGRES_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-postgres:/docker-entrypoint-initdb.d
    networks:
      - ecards-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecards_user -d ecards_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  # Cassandra - Canonical database for high-scale event/log data
  cassandra:
    image: cassandra:5.0
    container_name: ecards-cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: ${CASSANDRA_CLUSTER_NAME:-ecards_cluster}
      CASSANDRA_DC: ${CASSANDRA_DC:-dc1}
      CASSANDRA_RACK: ${CASSANDRA_RACK:-rack1}
      CASSANDRA_ENDPOINT_SNITCH: ${CASSANDRA_ENDPOINT_SNITCH:-GossipingPropertyFileSnitch}
      CASSANDRA_NUM_TOKENS: ${CASSANDRA_NUM_TOKENS:-256}
      # JVM Memory Settings (Development - Conservative)
      # Heap: 2GB (G1 GC auto-manages young generation, no need for HEAP_NEWSIZE)
      # Default in cassandra:5.0 is ~10GB which causes OOM in development
      MAX_HEAP_SIZE: ${CASSANDRA_MAX_HEAP_SIZE:-2G}
      # HEAP_NEWSIZE removed - incompatible with G1 GC in Cassandra 5.0
      # Limit direct memory to prevent OOM (default is 5G)
      JVM_OPTS: ${CASSANDRA_JVM_OPTS:--XX:MaxDirectMemorySize=1G}
    ports:
      - "0.0.0.0:${CASSANDRA_NATIVE_PORT_HOST:-7042}:${CASSANDRA_PORT:-9042}"
      - "0.0.0.0:${CASSANDRA_THRIFT_PORT_HOST:-7160}:9160"
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./db/init-cassandra:/docker-entrypoint-initdb.d
    networks:
      - ecards-network
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # Memory limit: Heap (2G) + Direct (1G) + OS overhead (1G) = 4G total
    # This prevents Docker OOM killer from terminating the container
    mem_limit: 4g
    # memswap_limit same as mem_limit = disable swap for this container
    memswap_limit: 4g

  # Redis - Job queue and cache
  redis:
    image: redis:7-alpine
    container_name: ecards-redis
    ports:
      - "0.0.0.0:${REDIS_HOST_PORT:-7379}:${REDIS_PORT:-6379}"
    volumes:
      - redis_data:/data
    networks:
      - ecards-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 256m

  # Frontend - Next.js 16 application (Public-facing)
  front-cards:
    build:
      context: ./front-cards
      dockerfile: Dockerfile.dev
    container_name: ecards-frontend
    ports:
      - "0.0.0.0:${FRONTEND_HOST_PORT:-7300}:${FRONTEND_PORT:-3000}"
    volumes:
      - ./front-cards:/app
      - /app/node_modules
      - /app/.next
    extra_hosts:
      # dev.aiepic.app → host: with `127.0.0.1 dev.aiepic.app` on the host, containers otherwise resolve
      # dev.aiepic.app to 127.0.0.1 *inside the container* (nothing on :443) → fetch ECONNREFUSED / OAuth fails.
      - "dev.aiepic.app:host-gateway"
      - "host.docker.internal:host-gateway"
    # Single source of truth: monorepo root `.env` (same as api-server). No front-cards/.env.local.
    env_file:
      - .env
    environment:
      # Next reads `PORT`; root `.env` also sets `PORT` for api-server — force the in-container listen to match the published port mapping.
      PORT: ${FRONTEND_PORT:-3000}
      # `DEBUG=*` in monorepo `.env` (for api) makes Next log send/compression/router at huge volume; use FRONT_CARDS_DEBUG if you need Next debug only.
      DEBUG: ${FRONT_CARDS_DEBUG:-}
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-1}
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS:-}
      OAUTH_DEV_INSECURE_TLS: ${OAUTH_DEV_INSECURE_TLS:-}
      # Defaults mirror .env.dev.example so a partial root `.env` still gets browser + OAuth URLs in the container.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:7400}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:7400}
      NEXT_PUBLIC_POST_LOGIN_REDIRECT_URL: ${NEXT_PUBLIC_POST_LOGIN_REDIRECT_URL:-/dashboard}
      NEXT_PUBLIC_OAUTH_CLIENT_ID: ${NEXT_PUBLIC_OAUTH_CLIENT_ID:-ecards_app_dev}
      NEXT_PUBLIC_OAUTH_AUTHORIZATION_ENDPOINT: ${NEXT_PUBLIC_OAUTH_AUTHORIZATION_ENDPOINT:-https://dev.aiepic.app/oauth/authorize}
      NEXT_PUBLIC_OAUTH_TOKEN_ENDPOINT: ${NEXT_PUBLIC_OAUTH_TOKEN_ENDPOINT:-https://dev.aiepic.app/oauth/token}
      NEXT_PUBLIC_OAUTH_USER_INFO_ENDPOINT: ${NEXT_PUBLIC_OAUTH_USER_INFO_ENDPOINT:-https://dev.aiepic.app/api/users/me}
      NEXT_PUBLIC_EXTERNAL_AUTH_URL: ${NEXT_PUBLIC_EXTERNAL_AUTH_URL:-https://dev.aiepic.app/app}
      NEXT_PUBLIC_USER_SUBSCRIPTION_URL: ${NEXT_PUBLIC_USER_SUBSCRIPTION_URL:-https://dev.aiepic.app/app/features/user-subscription}
    networks:
      - ecards-network
    depends_on:
      - api-server
    command: npm run dev
    mem_limit: 512m

  # API Server - Internal backend service (NOT the external auth API)
  # This is the E-Cards application's own API server for internal operations
  # All runtime configuration comes from the monorepo root .env (same as bin/start.sh --env-file);
  # copy .env.dev.example → .env and align hostnames for Compose (e.g. postgres, cassandra, redis).
  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile.dev
    container_name: ecards-api
    ports:
      - "0.0.0.0:${API_PORT:-7400}:${API_INTERNAL_PORT:-4000}"
    volumes:
      - ./api-server:/app
      - /app/node_modules
    extra_hosts:
      - "dev.aiepic.app:host-gateway"
      - "host.docker.internal:host-gateway"
    environment:
      OAUTH_DEV_INSECURE_TLS: ${OAUTH_DEV_INSECURE_TLS:-}
    env_file:
      - .env
    networks:
      - ecards-network
    depends_on:
      postgres:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    command: npm run dev
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Render Worker - Background job processor
  render-worker:
    build:
      context: ./render-worker
      dockerfile: Dockerfile.dev
    container_name: ecards-render-worker
    volumes:
      - ./render-worker:/app
      - /app/node_modules
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # PostgreSQL
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-ecards_db}
      POSTGRES_USER: ${POSTGRES_USER:-ecards_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecards_dev_password}
      # Cassandra
      CASSANDRA_HOSTS: ${CASSANDRA_HOSTS:-cassandra}
      CASSANDRA_PORT: ${CASSANDRA_PORT:-9042}
      CASSANDRA_KEYSPACE: ${CASSANDRA_KEYSPACE:-ecards_canonical}
      CASSANDRA_DC: ${CASSANDRA_DC:-dc1}
      # Redis
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # SeaweedFS (Remote - Client Configuration)
      USE_LOCAL_STORAGE: ${USE_LOCAL_STORAGE:-true}
      SEAWEEDFS_ENDPOINT: ${SEAWEEDFS_ENDPOINT:-http://localhost:8333}
      SEAWEEDFS_ACCESS_KEY: ${SEAWEEDFS_ACCESS_KEY:-your_seaweedfs_access_key}
      SEAWEEDFS_SECRET_KEY: ${SEAWEEDFS_SECRET_KEY:-your_seaweedfs_secret_key}
      SEAWEEDFS_BUCKET: ${SEAWEEDFS_BUCKET}
      # Worker config
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      WORKER_MAX_ATTEMPTS: ${WORKER_MAX_ATTEMPTS:-3}
      WORKER_TIMEOUT: ${WORKER_TIMEOUT:-60000}
      RENDER_ENGINE: ${RENDER_ENGINE:-canvas}
    networks:
      - ecards-network
    depends_on:
      postgres:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    command: npm run dev
    mem_limit: 256m

  # Database Initialization - Runs once on startup to create Cassandra keyspace
  db-init:
    image: cassandra:5.0
    container_name: ecards-db-init
    networks:
      - ecards-network
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./db/init-cassandra:/scripts
    command: >
      bash -c '
      echo "Initializing Cassandra...";
      for script in /scripts/*.cql; do
        if [ -f "$$script" ]; then
          echo "Running $$script...";
          cqlsh cassandra -f "$$script" || { echo "Failed to run $$script"; exit 1; };
        fi
      done;
      echo "Cassandra initialization complete!";
      '
    restart: "no"
    mem_limit: 128m

networks:
  ecards-network:
    driver: bridge

volumes:
  postgres_data:
  cassandra_data:
  redis_data:
